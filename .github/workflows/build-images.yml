name: Build and push images

# Builds and pushes backend + frontend to this repo's own GitHub Container
# Registry namespace: ghcr.io/<owner>/<repo>-backend and ...-frontend.
# Works unmodified for any shop repo created from this template — image
# names come from the repo itself, nothing to edit.
#
# Tag a release to trigger it:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push backend + frontend
        run: |
          repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          tag="${GITHUB_REF_NAME:-manual}"
          for component in backend frontend; do
            image="ghcr.io/$repo-$component"
            docker build -t "$image:$tag" -t "$image:latest" "$component"
            docker push "$image:$tag"
            docker push "$image:latest"
          done
