name: Build and push images

# Builds and pushes the backend and frontend images to this repo's own
# GitHub Container Registry (GHCR) namespace — ghcr.io/<owner>/<repo>-backend
# and ghcr.io/<owner>/<repo>-frontend. Works unmodified for any shop repo
# created from this template: the image names are derived from the repo
# itself, not hardcoded.
#
# Triggers on version tags (v1.2.3) and can also be run manually. Tag a
# release with:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag and name
        id: vars
        run: |
          # workflow_dispatch has no tag ref — fall back to "manual".
          echo "tag=${GITHUB_REF_NAME:-manual}" >> "$GITHUB_OUTPUT"
          # GHCR requires lowercase image names; github.repository preserves case.
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component }}
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo }}-${{ matrix.component }}:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ steps.vars.outputs.repo }}-${{ matrix.component }}:latest
