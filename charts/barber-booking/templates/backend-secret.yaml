apiVersion: v1
kind: Secret
metadata:
  name: {{ include "barber-booking.fullname" . }}-backend
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "jwtSecret is required — generate one with: openssl rand -hex 32" .Values.jwtSecret | quote }}
  OWNER_PASSWORD: {{ required "shop.owner.password is required" .Values.shop.owner.password | quote }}
  SMTP_USERNAME: {{ .Values.email.smtpUsername | quote }}
  SMTP_PASSWORD: {{ .Values.email.smtpPassword | quote }}
