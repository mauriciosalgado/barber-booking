apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "barber-booking.frontendDeploymentName" . }}
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
spec:
  # Replicas can go above 1 — Reflex keeps UI state in memory per worker, but
  # every reconnect (page load, or a fresh connection after a pod restarts)
  # re-derives it from the browser-held JWT (LocalStorage) plus the backend
  # API. A pod restart mid-session causes a brief reload and loses only
  # unsaved in-progress form input — never login, bookings, or schedule
  # data. No session affinity/stickiness is required for correctness; see
  # values.yaml for the (optional, not implemented) tradeoffs if reload
  # frequency ever becomes a real problem.
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ include "barber-booking.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "barber-booking.fullname" . }}-frontend
    spec:
      {{- include "barber-booking.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000 # matches the "app" user created in frontend/Dockerfile
        runAsGroup: 1000
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - name: web
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "barber-booking.frontendConfigMapName" . }}
          env:
            # Must match the backend's JWT_SECRET (same Secret) — lets the
            # frontend verify an access token's signature locally, so it can
            # show the right view immediately on page load instead of
            # waiting on a round-trip to the API first. The API itself is
            # still the source of truth: every real request re-checks the
            # user/role server-side regardless of what the token claims.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "barber-booking.backendSecretName" . }}
                  key: JWT_SECRET
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: web
            # Reflex compiles the UI on first start, which can take well over
            # a minute in a fresh container with no build cache — give it
            # real headroom so it isn't killed mid-compile.
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /
              port: web
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10
