{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "barber-booking.fullname" . }}-postgres
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "postgresql.password is required when postgresql.enabled=true" .Values.postgresql.password | quote }}
{{- end }}
