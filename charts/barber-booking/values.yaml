# Default values for barber-booking. One install = one shop.
# Override with your own values-<shop>.yaml — see the chart README's "GitOps
# (ArgoCD)" section for how a shop's Application is set up.

# --- Naming ------------------------------------------------------------
# Resources are named after the release name by default (e.g. "ribeiro" ->
# "ribeiro-backend"). Set nameOverride to use a different name instead.
nameOverride: ""

# --- Shop identity ---------------------------------------------------------
shop:
  name: "Change Me Barbershop"
  timezone: "Europe/Lisbon"
  brand: "#9e7b53" # accent colour, hex — the owner can recolour live from the UI
  background: "#f6f1e9" # page colour, hex
  headline: "" # sign-in headline; empty = none
  owner:
    name: "Owner"
    email: "owner@example.com"
    # Required. No default on purpose — set via --set or a values file that
    # isn't committed, e.g. --set shop.owner.password="a strong password".
    password: ""

# Signs every login/verification/reset token. Required, no default on purpose.
# Generate one per shop: openssl rand -hex 32
jwtSecret: ""

# For GitOps: instead of putting jwtSecret/shop.owner.password/email.smtp*
# above in a values file committed to git, create a Secret out-of-band
# (kubectl, SOPS, sealed-secrets, External Secrets Operator, your vault of
# choice — whatever your GitOps setup already uses) with these four keys:
#   JWT_SECRET, OWNER_PASSWORD, SMTP_USERNAME, SMTP_PASSWORD
# then point this at its name. When set, the chart does not render its own
# Secret and the jwtSecret/owner.password/smtp* values above are ignored.
existingSecret: ""

# --- Container images --------------------------------------------------
image:
  backend:
    repository: ghcr.io/CHANGE-ME/barber-booking-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/CHANGE-ME/barber-booking-frontend
    tag: latest
    pullPolicy: IfNotPresent

# --- Private registry access --------------------------------------------
# Only needed if image.*.repository is a private registry (e.g. GHCR with a
# private package). Two ways to configure, pick one:
#
# 1. GitOps-friendly (preferred): create the pull secret out-of-band, the
#    same way as existingSecret above, then just name it here:
#      kubectl create secret docker-registry ghcr-pull \
#        --docker-server=ghcr.io \
#        --docker-username=<github-username> \
#        --docker-password=<PAT with read:packages> \
#        --namespace <your-namespace>
imagePullSecrets: []
# imagePullSecrets:
#   - name: ghcr-pull
#
# 2. Let the chart create the secret for you from a PAT set here. Simpler,
#    but the PAT then lives in whatever values file sets it — only use this
#    with a values file that stays out of git (e.g. via --set, or a
#    GitOps secret tool that injects it at apply time rather than storing it
#    in the values file itself).
imageCredentials:
  registry: "" # e.g. ghcr.io
  username: ""
  password: "" # PAT with read:packages (or equivalent) scope

# --- Networking --------------------------------------------------------
# The frontend needs just ONE public hostname (ingress.host) — the booking
# website. Reflex's own event backend rides along on that same host (for
# websocket state sync and the shop's logo, see shop/api.py), so nothing
# else needs to be public: customers book, verify their email, and reset
# their password entirely through the frontend, which talks to the API
# pod-to-pod (cluster-internal, never through this Ingress).
#
# ingress.apiHost is OFF by default (empty) and should stay that way unless
# you have a real reason to expose the API. Setting it publishes the ENTIRE
# FastAPI app to the internet — every booking/auth endpoint, not just
# /docs and /admin — because the Ingress rule for apiHost is a catch-all
# "/" -> backend:8000. The one legitimate reason to turn it on is wanting
# the SQLAdmin console (/admin) or the API docs (/docs) reachable from a
# browser without a VPN/port-forward. If you do set it:
#   - Point apiHost's DNS at the same Ingress load balancer as host.
#   - The API gets its own TLS certificate/SAN entry alongside host.
#   - ADMIN_URL (below, via urls.adminUrl) then defaults to
#     "https://<apiHost>/admin" and the admin link appears in the UI again.
#   - Nothing else in the app changes — booking/verify/reset still go
#     through the frontend either way.
ingress:
  enabled: true
  className: nginx
  host: shop.example.com
  apiHost: "" # empty = API stays cluster-internal (recommended). See comment above before setting this.
  annotations: {}
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: "" # defaults to "<release-name>-tls-secret" if empty

# CORS allow-list for the API. Defaults to "https://<ingress.host>" if empty
# AND ingress.enabled=true, otherwise to "http://localhost:3000" — see the
# urls: block below for why "localhost" is a real, working default (not
# just a dev stand-in) even without Ingress.
corsOrigins: ""

# Advanced: override the public URLs directly instead of deriving them from
# ingress.host/apiHost (which assumes HTTPS behind a real Ingress). Leave
# these empty for a normal Ingress-fronted deployment.
#
# With ingress.enabled=false (LoadBalancer/NodePort/port-forward/VPN — no
# Ingress in front), reflexApiUrl/frontendUrl default to
# "http://localhost:3000", same as values-local.yaml. This isn't a dev-only
# placeholder: Reflex's own frontend JS treats "localhost" as a sentinel and
# swaps it for whatever host the browser actually used to load the page
# before opening the state-sync websocket — so booking, login, and admin
# keep working no matter which of port-forward/NodePort/LoadBalancer-IP you
# used, with nothing to configure per-environment, and without needing any
# of this to be a public, internet-reachable address.
#
# The one thing that swap doesn't cover is anything baked into plain static
# HTML instead of routed through that JS helper: the shop's logo/favicon,
# and any password-reset/verification emails (opened outside any browser
# session tied to this cluster) built from frontendUrl. Both simply fail
# silently (broken image, dead email link) until you're ready to serve real
# customers — at that point set reflexApiUrl/frontendUrl explicitly to a
# real reachable address (LAN IP, VPN/Tailscale hostname, or public domain).
urls:
  adminUrl: "" # link to the SQLAdmin console. Empty (default) hides it in the UI, UNLESS
               # ingress.enabled=true AND ingress.apiHost is set, in which case it
               # defaults to "https://<apiHost>/admin"
  reflexApiUrl: "" # browser -> Reflex's own event backend (websocket state + logo proxy).
                   # default: https://<ingress.host> if ingress.enabled=true,
                   # else http://localhost:3000 (see comment above).
  frontendUrl: "" # backend's password-reset/verification email links.
                  # default: https://<ingress.host> if ingress.enabled=true,
                  # else http://localhost:3000 — override this once real
                  # customers need working email links (see comment above).

# --- Network isolation ---------------------------------------------------
# Optional NetworkPolicy that walls off this release's namespace from every
# OTHER namespace in the cluster, while keeping the things the app actually
# needs working: pods within this release talking to each other, the
# Ingress controller reaching the frontend, DNS lookups, and any outbound
# internet traffic (SMTP for password-reset/verification emails, etc.).
# Requires a CNI that enforces NetworkPolicy (e.g. Calico, Cilium) — on one
# that doesn't, this resource is silently ignored, not enforced.
networkPolicy:
  enabled: false
  # Namespace the Ingress controller (Traefik, ingress-nginx, ...) runs in.
  # Required when enabled — without it, external visitors can no longer
  # reach the frontend once ingress from every other namespace is blocked.
  ingressControllerNamespace: ""
  # This cluster's Pod and Service CIDRs. Required when enabled, so the
  # "allow egress to the internet" rule can explicitly carve these two
  # ranges back out — without that, "the internet" (0.0.0.0/0) would also
  # cover every other namespace's pods/Services, defeating the point of
  # this policy. Find yours from your CNI's config (e.g. Calico's IPPool)
  # and your cluster's --service-cluster-ip-range (often the kubeadm
  # default 10.96.0.0/12).
  podCIDR: ""
  serviceCIDR: ""

# --- Email (required for real accounts to verify/reset passwords) ------
email:
  smtpHost: ""
  smtpPort: 587
  smtpFrom: "no-reply@example.com"
  smtpUsername: ""
  smtpPassword: ""
  smtpStartTLS: true

# --- Database ------------------------------------------------------------
# "sqlite"   - simplest option; a single file on a PersistentVolumeClaim.
#              Fine for one shop's traffic, no separate DB server to run.
# "postgres" - use the built-in Postgres below, or point at an external one.
database:
  type: sqlite

  sqlite:
    storage: 1Gi
    storageClassName: ""

  # Only used when database.type is "postgres" and postgresql.enabled is
  # false — set to your managed/external Postgres connection string.
  externalUrl: ""

# Built-in Postgres (a plain single-replica StatefulSet — no external chart
# dependency to keep this simple to read and audit). Only used when
# database.type is "postgres". Ignored entirely for sqlite.
postgresql:
  enabled: false
  image: postgres:16-alpine
  database: barber
  username: barber
  # Required if postgresql.enabled is true and existingSecret below is empty.
  password: ""
  # Same idea as the top-level existingSecret: a pre-created Secret with a
  # POSTGRES_PASSWORD key, so the DB password doesn't have to live in git
  # either. When set, postgresql.password above is ignored.
  existingSecret: ""
  storage: 2Gi
  storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# --- Backend (FastAPI) ---------------------------------------------------
# database.type: sqlite  -> keep replicas at 1. SQLite is a single file with
#   one writer at a time; a second pod risks "database is locked" errors or
#   corruption. The chart refuses to render (fails fast) if you set replicas
#   above 1 here without also switching to Postgres.
# database.type: postgres -> replicas can go above 1. The login/registration
#   rate limiter still counts hits in memory per pod (no Redis wired up), so
#   the effective cluster-wide limit is roughly multiplied by replica count
#   — the limits in app/routers/auth.py (5-10/minute) are deliberately low
#   enough that this stays impractical to brute-force even at a few replicas.
#   Fine for the handful of replicas (2-3) this chart is meant for; a shared
#   store like Redis would be needed well beyond that.
backend:
  replicas: 1
  # Deployment rollout strategy. Leave empty to pick the safe default for
  # database.type automatically: "Recreate" for sqlite (old pod fully gone
  # before the new one starts, so two pods never touch the file at once,
  # even briefly) or "RollingUpdate" for postgres (normal zero-downtime
  # rollout). Only override if you specifically know you need something else.
  updateStrategy: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    # Cluster-internal by design (see ingress.apiHost's comment above) —
    # only change this for direct testing, e.g. reaching /docs or /admin
    # without the frontend/Ingress in front.
    type: ClusterIP

# --- Frontend (Reflex) ---------------------------------------------------
# Replicas can go above 1 regardless of database.type. Reflex keeps UI state
# in memory per worker, but every reconnect re-derives it from the
# browser-held JWT (LocalStorage) plus the backend API — so a pod restart
# mid-session just causes a brief reload, never real data loss. No session
# affinity/stickiness is required for correctness.
frontend:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      # Reflex's production build compiles the frontend on first boot, which
      # briefly spikes memory well above its ~200Mi steady-state usage.
      # Measured OOMKilled at 512Mi under Kubernetes' no-swap memory
      # accounting; 1Gi gives a safe margin (confirmed stable in testing).
      memory: 1Gi
  # Dev-only convenience link to a caught-email inbox (e.g. Mailpit). Leave
  # empty in production.
  mailInboxUrl: ""
  service:
    # ClusterIP (default) is right behind an Ingress. Set to LoadBalancer to
    # get an external IP directly from the Service — e.g. to reach the app
    # from outside the cluster without setting up Ingress/DNS/TLS first,
    # or NodePort if your cluster/network doesn't support LoadBalancer.
    type: ClusterIP
